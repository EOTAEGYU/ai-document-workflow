services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres_user
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: app_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres_user"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  temporal:
    image: temporalio/auto-setup:1.24.2
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: postgres_user
      POSTGRES_PWD: postgres_password
      POSTGRES_SEEDS: postgres
    ports:
      - "7233:7233"
    restart: unless-stopped

  temporal-ui:
    image: temporalio/ui:2.31.2
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    restart: unless-stopped

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
    restart: unless-stopped

  worker:
    build: .
    command: ["python", "-m", "worker.main"]
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
    restart: unless-stopped

volumes:
  postgres_data:
